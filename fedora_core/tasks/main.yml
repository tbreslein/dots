---
- name: Install dnf packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ dnf_packages }}"

- name: Create users
  ansible.builtin.user:
    name: "{{ item.name }}"
    comment: "{{ item.full_name }}"
    create_home: true
    shell: /bin/zsh
    state: present
    groups: "{{ item.groups }}"
    append: true
  loop: "{{ users }}"

- name: Configure GNOME dconf
  become_user: tommy
  community.general.dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop: "{{ dconf_settings }}"
