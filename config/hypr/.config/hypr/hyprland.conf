# This is an example Hyprland config file.
#
# Refer to the wiki for more information.

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,auto


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox
exec = kanshi
exec-once = waybar
exec-once = dunst
exec-once = wlsunset -l 54.3 -L 10.1
exec-once = nm-applet --indicator
exec-once = sleep 10 && megasync

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
# env = XCURSOR_SIZE,24

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = real-prog-dvorak,us
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = master
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    blur = true
    blur_size = 3
    blur_passes = 1
    blur_new_optimizations = true

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    # animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$screenlock = swaylock -f -c 000000

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SUPER, return, exec, alacritty
bind = SUPER, Q, killactive,
bind = SUPER, M, exit,
bind = SUPER, V, togglefloating,
bind = SUPER, space, exec, wofi -G -H 400 -W 600 -S run
# bind = SUPER, space, exec, dmenu_run -b
bind = SUPER, P, exec, grim -g "$(slurp)" - | swappy -f -
bind = SUPER, U, pseudo, # dwindle
bind = SUPER, I, togglesplit, # dwindle
bind = SUPER_CONTROL, L, exec, $screenlock

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, PLUS, workspace, 1
bind = SUPER, BRACKETLEFT, workspace, 2
bind = SUPER, BRACELEFT, workspace, 3
bind = SUPER, PARENLEFT, workspace, 4
bind = SUPER, AMPERSAND, workspace, 5
bind = SUPER, EQUAL, workspace, 6
bind = SUPER, PARENRIGHT, workspace, 7
bind = SUPER, BRACERIGHT, workspace, 8
bind = SUPER, BRACKETRIGHT, workspace, 9
bind = SUPER, ASTERISK, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER_SHIFT, PLUS, movetoworkspace, 1
bind = SUPER_SHIFT, BRACKETLEFT, movetoworkspace, 2
bind = SUPER_SHIFT, BRACELEFT, movetoworkspace, 3
bind = SUPER_SHIFT, PARENLEFT, movetoworkspace, 4
bind = SUPER_SHIFT, AMPERSAND, movetoworkspace, 5
bind = SUPER_SHIFT, EQUAL, movetoworkspace, 6
bind = SUPER_SHIFT, PARENRIGHT, movetoworkspace, 7
bind = SUPER_SHIFT, BRACERIGHT, movetoworkspace, 8
bind = SUPER_SHIFT, BRACKETRIGHT, movetoworkspace, 9
bind = SUPER_SHIFT, ASTERISK, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
