---
- name: Install Arch repo packages
  ansible.builtin.pacman:
    name: "{{ item }}"
    state: present
  loop: "{{ arch_packages }}"

- name: Install AUR packages
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: "{{ item }}"
  loop: "{{ aur_packages }}"

- name: Setup .npm_global
  ansible.builtin.file:
    dest: "~/.npm_global"
    owner: tommy
    state: directory

- name: Install global npm packages
  become_user: tommy
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
  loop: "{{ npm_packages }}"
