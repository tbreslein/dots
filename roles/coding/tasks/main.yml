---
- name: Install Arch repo packages
  ansible.builtin.pacman:
    name: "{{ item }}"
    state: present
  loop: "{{ arch_packages }}"

- name: Install AUR packages
  become: true
  become_user: kain
  kewlfft.aur.aur:
    name: "{{ item }}"
  loop: "{{ aur_packages }}"

- name: Setup .npm_global
  ansible.builtin.file:
    dest: "~/.npm_global"
    owner: tommy
    state: directory

- name: init opam
  become: true
  become_user: tommy
  ansible.builtin.shell: |
    opam init -a

- name: install opam packages
  become: true
  become_user: tommy
  ansible.builtin.shell: |
    opam install "{{ item }}" -y
  loop: "{{ opam_packages}}"
