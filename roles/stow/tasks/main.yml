---
- name: Install stow
  ansible.builtin.pacman:
    name: stow
    state: present

- name: Stow dotfiles
  become_user: tommy
  ansible.builtin.shell:
    cmd: "stow -d $HOME/dots/config -t ~/ {{ item }}"
  loop: "{{ common_stows }}"

- name: Create .local/bin
  ansible.builtin.file:
    path: /home/tommy/.local/bin
    state: directory
    recurse: true
    owner: tommy
    group: tommy
    mode: '0755'

- name: Link scripts
  ansible.builtin.file:
    src: "/home/tommy/dots/scripts/{{ item }}"
    dest: "/home/tommy/.local/bin/{{ item }}"
    owner: tommy
    group: tommy
    state: link
  loop: "{{ scripts }}"
